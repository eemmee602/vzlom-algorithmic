<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Vzlom Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* Screens */
.screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;background:#0d0d1a;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}
.screen h1{font-size:22px;color:#00d4ff}
.screen .sub{font-size:10px;color:#666;margin-bottom:8px}
.screen input{width:100%;max-width:280px;background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:8px;padding:12px;font-size:14px;font-family:Consolas,monospace;outline:none;text-align:center}
.screen input:focus{border-color:#00d4ff}
.screen .btn-row{display:flex;gap:8px;width:100%;max-width:280px}
.screen button{flex:1;background:#00d4ff;color:#000;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:bold;cursor:pointer;font-family:Consolas,monospace}
.screen button.sec{background:#1a1a2e;color:#888;border:1px solid #2a2a4a}
.screen .err{font-size:11px;color:#ff4444;min-height:18px;max-width:280px;text-align:center}
.screen .link{font-size:11px;color:#888;cursor:pointer;text-decoration:underline;margin-top:4px}

/* App */
.app{flex:1;display:flex;flex-direction:column;z-index:1;position:relative;opacity:0;transition:opacity .3s}
.app.show{opacity:1}
.header{background:#16213e;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a4a}
.header h1{font-size:14px;color:#00d4ff}
.header .right{font-size:10px;color:#888;margin-left:auto;display:flex;align-items:center;gap:4px}
.header .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.idle{background:#888}.dot.think{background:#00d4ff;animation:pulse .8s ease-in-out infinite}.dot.work{background:#ffb90f;animation:pulse .6s ease-in-out infinite}.dot.err{background:#ff4444}.dot.done{background:#00ff88}
.tword{font-size:10px;color:#00d4ff;font-weight:bold;min-width:70px;text-align:right}
@keyframes pulse{0%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}100%{opacity:.3;transform:scale(.8)}}

.key-indicator{font-size:9px;color:#888;margin-left:auto;display:flex;align-items:center;gap:4px}
.key-indicator .kbadge{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:4px;padding:2px 6px;font-size:9px;color:#00d4ff}

.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{background:#1a1a2e;border-radius:6px;padding:8px 10px;font-size:13px;line-height:1.5;max-width:98%;word-break:break-word;animation:fadeIn .2s}
.msg.user{border-left:2px solid #00d4ff}
.msg.assistant{border-left:2px solid #00ff88;background:#161f16}
.msg.bash{border-left:2px solid #ffb90f;background:#19160d;font-family:Consolas,monospace;font-size:11px;white-space:pre-wrap}
.msg.status{border-left:2px solid #888;background:#141e14;font-size:11px;text-align:center}
.msg.code{border-left:2px solid #ff8800;background:#111;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap}
.msg.done{border-left:2px solid #00ff88;background:#0d1f0d;font-size:11px;text-align:center;color:#00ff88}
.msg.sys{font-size:10px;color:#666;text-align:center;border-left:2px solid transparent;padding:4px 8px}
.msg.auto{border-left:2px solid #f0f;background:#1a0d1a;font-size:11px;color:#daf}
.msg.keyinfo{border-left:2px solid #ff8800;background:#1a1508;font-size:11px;color:#ffa}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.input-bar{background:#16213e;padding:8px;display:flex;gap:8px;border-top:1px solid #2a2a4a;align-items:flex-end}
.input-bar textarea{flex:1;background:#0d0d1a;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:6px;padding:10px;font-size:14px;font-family:Consolas,monospace;resize:none;min-height:44px;max-height:120px;outline:none}
.input-bar textarea:focus{border-color:#00d4ff}
.input-bar button{background:#00d4ff;color:#000;border:none;border-radius:6px;padding:10px 16px;font-size:16px;font-weight:bold;cursor:pointer}

.bottom-nav{background:#16213e;display:flex;border-top:1px solid #2a2a4a}
.bottom-nav button{flex:1;background:#0d0d1a;color:#888;border:none;padding:10px;font-size:12px;font-family:Consolas,monospace;cursor:pointer;border-right:1px solid #2a2a4a}
.bottom-nav button.on{color:#00d4ff;background:#1a1a2e}

.panel{display:none;background:#0d0d1a;padding:12px;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.panel.show{display:flex}
.panel label{font-size:11px;color:#888}
.panel input,.panel select,.panel textarea{background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:4px;padding:8px;font-size:12px;font-family:Consolas,monospace;outline:none}
.panel button{background:#00d4ff;color:#000;border:none;border-radius:4px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer}
.panel button.danger{background:#ff4444}
.panel button.sec{background:#1a1a2e;color:#888;border:1px solid #2a2a4a}
.panel .user-info{font-size:12px;color:#0f8;padding:8px;background:#1a1a2e;border-radius:4px;display:flex;align-items:center;gap:6px}

/* Key list */
.key-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.key-row{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#1a1a2e;border-radius:4px;font-size:11px}
.key-row .kid{color:#00d4ff;font-family:Consolas;flex-shrink:0;min-width:50px}
.key-row .kstat{font-size:9px;color:#888;margin-left:auto;flex-shrink:0}
.key-row button{background:none;border:1px solid #ff4444;color:#ff4444;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- Screen 1: Login -->
<div class="screen" id="sLogin">
  <h1>🖥️ VZLOM</h1>
  <p class="sub">Connexion</p>
  <input type="text" id="inNick" placeholder="Surnom" autocomplete="off">
  <input type="password" id="inPass" placeholder="Mot de passe" autocomplete="off">
  <div class="err" id="errLogin"></div>
  <div class="btn-row">
    <button onclick="login()">🔑 Connexion</button>
    <button class="sec" onclick="showRegister()">📝 Créer</button>
  </div>
</div>

<!-- Screen 2: Register -->
<div class="screen hidden" id="sRegister">
  <h1>📝 Créer un compte</h1>
  <p class="sub">Vzlom</p>
  <input type="text" id="inRegNick" placeholder="Surnom" autocomplete="off">
  <input type="password" id="inRegPass" placeholder="Mot de passe" autocomplete="off">
  <div class="err" id="errReg"></div>
  <div class="btn-row">
    <button onclick="register()">✅ Créer</button>
    <button class="sec" onclick="hideRegister()">← Retour</button>
  </div>
</div>

<!-- Main App -->
<div class="app" id="app">
  <div class="header">
    <span>🖥️</span>
    <h1>VZLOM <span id="userBadge" style="font-size:9px;color:#0f8"></span></h1>
    <div class="right" style="display:flex;align-items:center;">
      <span class="key-indicator" id="keyIndicator" style="display:none">
        <span class="kbadge" id="keyBadge">—</span>
        <span id="keyCount">0</span> clés
      </span>
      <span class="tword" id="tword">Prêt</span>
      <span class="dot idle" id="sdot"></span>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="panel" id="panel">
    <div class="user-info">👤 <span id="pnNick">—</span> <button onclick="logout()" style="margin-left:auto;padding:4px 8px;font-size:10px;background:#f44;width:auto">🚪</button></div>

    <label>🤖 Modèle</label>
    <input type="text" id="inModel" value="google/gemini-2.0-flash-lite">

    <label>🔄 Fallbacks</label>
    <textarea id="inFall" rows="3">google/gemini-2.0-flash-lite
deepseek/deepseek-chat
mistralai/mistral-small-2501
meta-llama/llama-3.2-3b-instruct</textarea>

    <label>⚙ Auto-agent</label>
    <select id="inAuto">
      <option value="off">❌ Off</option>
      <option value="smart" selected>🧠 Smart (correction+tâches)</option>
      <option value="full">🤖 Full (max 5 iters)</option>
    </select>

    <label>🔑 Clés API (<span id="keyLabelCount">0</span>)</label>
    <div style="display:flex;gap:6px;width:100%;max-width:280px">
      <input type="password" id="inKey" placeholder="sk-or-v1-..." style="flex:1">
      <button onclick="addKeyManual()" style="flex-shrink:0;padding:10px 12px;font-size:13px">+</button>
    </div>
    <div class="key-list" id="keyList"></div>

    <div style="display:flex;gap:6px;width:100%;max-width:280px;margin-top:4px">
      <button onclick="importKeysBulk()" class="sec" style="flex:1;font-size:11px">📥 Importer (1/clé ligne)</button>
      <button onclick="rotateKey()" class="sec" style="flex-shrink:0;font-size:11px">🔄 Roter</button>
    </div>

    <label style="margin-top:8px">🗄️ Fichier clé (une clé par ligne)</label>
    <textarea id="inBulkKeys" rows="4" placeholder="sk-or-v1-abc...&#10;sk-or-v1-def...&#10;..."></textarea>

    <label>🧠 Ma mémoire</label>
    <button onclick="syncMem()">🔄 Sync</button>
    <button onclick="addMsg('🗑 Effacé (local)','sys');localStorage.removeItem('vzlom_mem')" style="background:#1a1a2e;color:#888;border:1px solid #2a2a4a">🗑 Effacer mémoire</button>
  </div>
  <div class="input-bar">
    <textarea id="inTxt" placeholder="Écris..." rows="1" oninput="x(this)"></textarea>
    <button id="btnSend" onclick="send()">⏎</button>
  </div>
  <div class="bottom-nav">
    <button id="tbChat" class="on" onclick="tab('chat')">💬 Chat</button>
    <button id="tbCfg" onclick="tab('cfg')">⚙ Config</button>
    <button onclick="logout()">🚪</button>
  </div>
</div>

<script>
// Canvas stars
;(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const s=[];for(let i=80;i--;)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.3,o:Math.random()*.4+.1,sp:Math.random()*.02+.005,ph:Math.random()*Math.PI*2});
  function d(){ctx.clearRect(0,0,c.width,c.height);const t=Date.now()/1e3;for(const a of s){const al=a.o+Math.sin(t*a.sp+a.ph)*a.o*.5;ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,220,255,${Math.max(0,Math.min(1,al))})`;ctx.fill()}requestAnimationFrame(d)}
  d();addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
})();

// State
const BRIDGE='http://localhost:3456',API='https://openrouter.ai/api/v1/chat/completions';
let S={token:'',nick:'',keys:[],model:'google/gemini-2.0-flash-lite',falls:['deepseek/deepseek-chat','mistralai/mistral-small-2501','meta-llama/llama-3.2-3b-instruct'],auto:'smart',history:[],ki:0,busy:false,iters:0,maxIters:5};

// ─── Config loader ───
async function loadConfig(){
  try{
    const res=await fetch(`${BRIDGE}/api/config`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const cfg=await res.json();
    // Clé .env
    if(cfg.openrouter_api_key){
      if(!S.keys.some(k=>k.id==='env')){
        S.keys.unshift({id:'env',key:cfg.openrouter_api_key,source:'env'});
      }
    }
    S.model=cfg.models.default;
    S.falls=cfg.models.fallbacks;
    refreshKeyUI();
    document.getElementById('inModel').value=S.model;
    document.getElementById('inFall').value=S.falls.join('\n');
  }catch(e){
    console.error("Config error:",e);
    addMsg('⚠️ Config bridge injoignable: '+e.message,'sys');
  }
}

// ─── Key management ───
function refreshKeyUI(){
  const badge=document.getElementById('keyBadge');
  const count=document.getElementById('keyCount');
  const label=document.getElementById('keyLabelCount');
  const indicator=document.getElementById('keyIndicator');
  const list=document.getElementById('keyList');

  label.textContent=S.keys.length;
  const usable=S.keys.filter(k=>k.id!=='env');
  if(S.keys.length){
    indicator.style.display='inline-flex';
    badge.textContent=S.keys[S.ki]?.id?.substring(0,8)||'—';
    count.textContent=S.keys.length;
  }else{
    indicator.style.display='none';
  }

  list.innerHTML='';
  S.keys.forEach((k,i)=>{
    const row=document.createElement('div');
    row.className='key-row';
    const isActive=i===S.ki;
    row.innerHTML=`
      <span class="kid">${k.id.substring(0,8)}</span>
      <span style="color:${isActive?'#00ff88':'#666'};font-size:10px">${k.source}</span>
      <span class="kstat">${k.hits||0} hits</span>
      ${k.source!=='env'?`<button onclick="removeKey(${i})" title="Supprimer">✕</button>`:'<span style="color:#666">env</span>'}
    `;
    if(isActive)row.style.border='1px solid #00d4ff';
    list.appendChild(row);
  });
}

function addKeyManual(){
  const val=document.getElementById('inKey').value.trim();
  if(!val){document.getElementById('errLogin').textContent='Clé vide';return}
  if(val.length<10){document.getElementById('errLogin').textContent='Clé trop courte';return}
  // Check duplicate
  if(S.keys.some(k=>k.key===val)){
    document.getElementById('errLogin').textContent='Clé déjà ajoutée';return;
  }
  S.keys.push({id:secrets.token_hex?secrets.token_hex(8):Math.random().toString(36).slice(2,10),key:val,source:'manual',hits:0,last_used:0});
  document.getElementById('inKey').value='';
  refreshKeyUI();
  saveCfg();
  addMsg('✅ Clé ajoutée (total: '+S.keys.length+')','sys');
}

function importKeysBulk(){
  const raw=document.getElementById('inBulkKeys').value.trim();
  if(!raw){addMsg('Aucune clé dans le champ','sys');return}
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let added=0;
  for(const line of lines){
    if(line.length>=10 && !S.keys.some(k=>k.key===line)){
      S.keys.push({id:Math.random().toString(36).slice(2,10),key:line,source:'bulk',hits:0,last_used:0});
      added++;
    }
  }
  document.getElementById('inBulkKeys').value='';
  refreshKeyUI();
  saveCfg();
  addMsg(`✅ ${added} clés importées (total: ${S.keys.length})`,'sys');
}

function removeKey(i){
  const k=S.keys[i];
  if(k.source==='env')return;
  if(!confirm('Supprimer la clé '+k.id.substring(0,8)+'…?'))return;
  S.keys.splice(i,1);
  if(S.ki>=S.keys.length)S.ki=0;
  refreshKeyUI();
  saveCfg();
}

function rotateKey(){
  if(S.keys.length<2)return;
  S.ki=(S.ki+1)%S.keys.length;
  refreshKeyUI();
  addMsg('🔄 Clé active: '+S.keys[S.ki].id.substring(0,8),'keyinfo');
}

// Generate a random id for keys
const secrets=secrets||{token_hex:n=>Math.random().toString(36).slice(2,2+n)};

const WORDS=['Thinking...','Analyzing...','Reading...','Beaming...','Imagining...','Coding...','Searching...','Scanning...','Synthesizing...','Crafting...','Forging...','Mapping...'];
let twInt=null;

function twStart(){
  let i=0;const e=document.getElementById('tword');
  e.textContent='Thinking...';e.style.color='#0df';
  twInt=setInterval(()=>{i=(i+1)%WORDS.length;e.textContent=WORDS[i]},1200);
}
function twStop(){
  if(twInt){clearInterval(twInt);twInt=null}
  document.getElementById('tword').textContent='Prêt';
  document.getElementById('tword').style.color='#888';
}
function sdot(c){document.getElementById('sdot').className='dot '+c}

async function bp(path,body){
  try{
    const o={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)};
    const u=S.token?`${BRIDGE}${path}?token=${S.token}`:`${BRIDGE}${path}`;
    const r=await fetch(u,o);
    return await r.json();
  }catch(e){return{error:e.message||'Erreur réseau'}}
}

// Auth
function showRegister(){
  document.getElementById('sLogin').classList.add('hidden');
  document.getElementById('sRegister').classList.remove('hidden');
}
function hideRegister(){
  document.getElementById('sRegister').classList.add('hidden');
  document.getElementById('sLogin').classList.remove('hidden');
}

async function login(){
  const n=document.getElementById('inNick').value.trim(),p=document.getElementById('inPass').value.trim();
  if(!n||!p){document.getElementById('errLogin').textContent='Champs requis';return}
  document.getElementById('errLogin').textContent='⏳ Connexion...';
  const r=await bp('/auth/login',{nickname:n,password:p});
  if(r.error){document.getElementById('errLogin').textContent=r.error;return}
  S.token=r.token;S.nick=r.nickname;
  afterLogin();
}

async function register(){
  const n=document.getElementById('inRegNick').value.trim(),p=document.getElementById('inRegPass').value.trim();
  if(!n||!p){document.getElementById('errReg').textContent='Champs requis';return}
  document.getElementById('errReg').textContent='⏳ Création...';
  const r=await bp('/auth/register',{nickname:n,password:p});
  if(r.error){document.getElementById('errReg').textContent=r.error;return}
  S.token=r.token;S.nick=r.nickname;
  afterLogin();
}

function afterLogin(){
  document.getElementById('sLogin').classList.add('hidden');
  document.getElementById('sRegister').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  document.getElementById('userBadge').textContent='👤 '+S.nick;
  document.getElementById('pnNick').textContent=S.nick;
  // Load config from localStorage
  const sv=JSON.parse(localStorage.getItem('v2cfg')||'{}');
  if(sv.keys)S.keys=sv.keys;
  if(sv.model)S.model=sv.model;
  if(sv.falls)S.falls=sv.falls;
  if(sv.auto)S.auto=sv.auto;
  document.getElementById('inModel').value=S.model;
  document.getElementById('inFall').value=(S.falls||[]).join('\n');
  document.getElementById('inAuto').value=S.auto;
  addMsg('✅ Connecté: '+S.nick,'sys');
  addMsg('🤖 Hermès prêt — Tab Config > Clés API pour gérer les clés','sys');
  refreshKeyUI();
  syncMem();
}

async function logout(){
  if(S.token)await bp('/logout',{});
  S.token='';S.nick='';S.history=[];
  document.getElementById('app').classList.remove('show');
  document.getElementById('sLogin').classList.remove('hidden');
  document.getElementById('inNick').value='';document.getElementById('inPass').value='';
  document.getElementById('errLogin').textContent='';
  twStop();sdot('idle');
}

// Memory
async function syncMem(){
  if(!S.token)return;
  try{
    const r=await bp('/memory/context',{token:S.token});
    if(r.context)try{localStorage.setItem('vzlom_mem',r.context)}catch(e){}
  }catch(e){console.error('syncMem error:',e)}
}

async function saveMem(content,src){
  if(!S.token)return;
  await bp('/memory',{content,source:src});
}

async function getMem(){
  if(!S.token)return'';
  try{
    const r=await bp('/memory/context',{token:S.token});
    return r.context||'';
  }catch(e){return''}
}

// UI
let curDiv=null,inCode=false,cBuf='',doneShow=false;

function addMsg(t,c){
  const ch=document.getElementById('chat'),d=document.createElement('div');
  d.className='msg '+c;d.textContent=t;ch.appendChild(d);ch.scrollTop=ch.scrollHeight;return d;
}
function x(e){e.style.height='auto';e.style.height=e.scrollHeight+'px'}

function tab(t){
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('on'));
  document.getElementById('chat').style.display=t==='chat'?'flex':'none';
  document.getElementById('panel').classList.toggle('show',t==='cfg');
  document.querySelector('.input-bar').style.display=t==='chat'?'flex':'none';
  document.getElementById('tbCfg').classList.toggle('on',t==='cfg');
  document.getElementById('tbChat').classList.toggle('on',t==='chat');
}

// Config save
document.getElementById('inKey').addEventListener('change',()=>{
  const val=document.getElementById('inKey').value.trim();
  if(val)addKeyManual();
});
document.getElementById('inModel').addEventListener('change',()=>{
  S.model=document.getElementById('inModel').value.trim();saveCfg();
});
document.getElementById('inFall').addEventListener('change',()=>{
  S.falls=document.getElementById('inFall').value.split('\n').map(s=>s.trim()).filter(Boolean);
  saveCfg();
});
document.getElementById('inAuto').addEventListener('change',()=>{
  S.auto=document.getElementById('inAuto').value;saveCfg();
});
function saveCfg(){localStorage.setItem('v2cfg',JSON.stringify({keys:S.keys,model:S.model,falls:S.falls,auto:S.auto}))}

// System prompt
function sysPrompt(mem){
  return `Tu es Hermès pour Vzlom, assistant IA de ${S.nick||'Emerick'}.

STYLE : français, concis, technique, direct, va droit au but.

MARQUEURS (sur leur propre ligne) :
--status-- <action> — 1-2 mots sur ce que tu fais
--memory-save-- <texte> — sauvegarder info
--continue-- — tu veux continuer / corriger
--fix-- — tu corriges une erreur que tu as détectée
--done-- — fini (SEULEMENT si tout est terminé)

AUTO-CORRECTION : si tu vois une erreur dans ta réponse ou bash output, utilise --fix-- puis corrige immédiatement sans attendre. Tu peux enchaîner plusieurs --continue--.

RÈGLE : tu fais TOUT. Bash, fichiers, tout. Tu ne t'arrêtes pas tant que c'est pas fini.

CLÉS API ACTIVES : ${S.keys.length} clé(s), rotation active.

MÉMOIRE :
${mem||'Aucune.'}`;
}

// Main send + auto-loop
async function send(fromAuto){
  if(S.busy&&!fromAuto)return;
  const inp=document.getElementById('inTxt');
  const txt=fromAuto?(typeof fromAuto==='string'?fromAuto:'Continue. Corrige si erreur.'):inp.value.trim();
  if(!txt)return;

  S.busy=true;document.getElementById('btnSend').disabled=true;S.iters=0;
  if(!fromAuto){addMsg(txt,'user');saveMem('[User] '+txt,'user')}
  inp.value='';x(inp);

  twStart();sdot('think');
  const mem=await getMem();
  await loop(txt,mem,fromAuto);
  twStop();sdot('done');
  S.busy=false;document.getElementById('btnSend').disabled=false;
}

async function loop(txt,mem,isAuto){
  let msgs=[{role:'system',content:sysPrompt(mem)}];
  for(const m of S.history)msgs.push(m);
  msgs.push({role:'user',content:txt});

  let att=0,maxAtt=S.keys.length+(S.falls?.length||0),lastErr='';

  while(att<=maxAtt){
    const ki=S.ki%S.keys.length;
    const key=S.keys[ki]?.key;
    if(!key){addMsg('❌ Aucune clé API valide','status');sdot('err');return}

    const model=att<1?S.model:(S.falls?.[att-1]||S.model);
    addMsg('🔄 Tentative '+(att+1)+'/'+(maxAtt+1)+': '+model.split('/').pop()+' ['+S.keys[ki].id.substring(0,8)+']','status');
    curDiv=null;inCode=false;cBuf='';doneShow=false;
    S.keys[ki].hits=(S.keys[ki].hits||0)+1;
    S.keys[ki].last_used=Date.now();

    try{
      const res=await fetch(API,{
        method:'POST',
        headers:{
          'Authorization':'Bearer '+key,'Content-Type':'application/json',
          'HTTP-Referer':'https://github.com/eemmee602/vzlom-algorithmic','X-Title':'Vzlom Mobile'
        },
        body:JSON.stringify({model,messages:msgs,stream:true,max_tokens:2048})
      });

      // Rate limit → rotation automatique
      if(res.status===429){
        lastErr='Rate limit (HTTP 429)';
        S.ki=(S.ki+1)%S.keys.length;att++;
        refreshKeyUI();
        continue;
      }
      if(!res.ok) throw new Error(`HTTP ${res.status}: ${(await res.text()).substring(0,200)}`);

      const rdr=res.body.getReader(),dec=new TextDecoder();
      let full='';
      while(true){
        const {done,value}=await rdr.read();
        if(done)break;
        const chunk=dec.decode(value,{stream:true});
        for(const ln of chunk.split('\n')){
          if(!ln.startsWith('data: '))continue;
          const d=ln.substring(6);
          if(d==='[DONE]')break;
          try{
            const j=JSON.parse(d),delta=j.choices?.[0]?.delta?.content;
            if(delta){full+=delta;prs(delta,full)}
          }catch(e){}
        }
      }
      if(inCode&&cBuf.trim()){addMsg(cBuf,'code');full+='\n```\n'+cBuf+'\n```'}
      S.history.push({role:'assistant',content:full});

      const si=full.indexOf('--memory-save--');
      if(si>=0){const sv=full.substring(si+16).split('--')[0].trim();if(sv)saveMem('[AI] '+sv,'ai')}

      if(!doneShow)addMsg('✅ Terminé','done');
      sdot('done');

      // Auto-loop logic
      const cont=shouldCont(full);
      if(cont&&S.iters<S.maxIters){
        S.iters++;
        addMsg(`🔄 Auto #${S.iters} — ${cont.why}`,'auto');
        msgs.push({role:'assistant',content:full});
        msgs.push({role:'user',content:cont.msg});
        att=0;continue;
      }
      refreshKeyUI();
      return;
    }catch(e){
      lastErr=e.message;S.ki=(S.ki+1)%S.keys.length;att++;
      refreshKeyUI();
    }
  }
  addMsg('❌ Échec: '+lastErr,'status');sdot('err');
}

function shouldCont(r){
  if(S.auto==='off')return null;
  const l=r.toLowerCase();
  if(l.includes('--fix--'))return {why:'auto-correction',msg:'Tu as signalé une erreur. Corrige-la maintenant.'};
  if(l.includes('--continue--'))return {why:'continuation',msg:'Continue. Termine ce que tu faisais.'};
  if(l.includes('--task--'))return {why:'sous-tâche',msg:'Exécute la sous-tâche que tu as créée.'};
  if(S.auto==='full'&&l.includes('--status--')&&!l.includes('--done--'))return {why:'tâche en cours',msg:'Continue. Tu n\'as pas encore terminé.'};
  return null;
}

// Parser
function prs(chunk,full){
  if(chunk.includes('--status--')||chunk.includes('--bash--')||chunk.includes('```')||chunk.includes('--done--'))
    pMark(chunk,full);
  else app(chunk);
}

function pMark(text,full){
  const re=/(--status--)\s*([^-]+)--|--bash--\s+([^\n]+)|```(\w*)\n|```|--done--/g;
  let li=0,m;
  while((m=re.exec(text))){
    if(m.index>li)app(text.substring(li,m.index));
    li=m.index+m[0].length;
    if(m[0].startsWith('--status--')){const s=m[2]?m[2].trim():'';addMsg('⚡ '+s,'status')}
    else if(m[0].startsWith('--bash--')){
      const c=m[3]?m[3].trim():'';addMsg('┌─ bash ─┐\n$ '+c,'bash');
      bp('/bash?token='+S.token,{command:c}).then(r=>{if(r&&r.output)addMsg(r.output.substring(0,400),'bash')});
    }
    else if(m[0].startsWith('```')&&!inCode){inCode=true;cBuf=''}
    else if(m[0]==='```'&&inCode){inCode=false;if(cBuf.trim()){addMsg(cBuf,'code');S.history.push({role:'assistant',content:'\n```\n'+cBuf+'\n```'});cBuf=''}}
    else if(m[0]==='--done--'){if(!doneShow){doneShow=true;addMsg('✅ Terminé','done')}}
  }
  if(li<text.length)app(text.substring(li));
}

function app(t){
  if(!t)return;
  if(inCode){cBuf+=t;return}
  if(!curDiv)curDiv=addMsg('','assistant');
  curDiv.textContent+=t;document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

document.getElementById('inTxt').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});

// ─── INIT au chargement ───
loadConfig();
</script>
