<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Vzlom Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#16213e;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a4a}
.header h1{font-size:14px;color:#00d4ff;font-weight:bold}
.status{font-size:10px;color:#888;margin-left:auto}
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{background:#1a1a2e;border-radius:6px;padding:8px 10px;font-size:13px;line-height:1.5;max-width:98%;word-break:break-word;animation:fadeIn .2s}
.msg.user{border-left:2px solid #00d4ff}
.msg.assistant{border-left:2px solid #00ff88;background:#161f16}
.msg.bash{border-left:2px solid #ffb90f;background:#19160d;font-family:Consolas,monospace;font-size:11px;white-space:pre-wrap;line-height:1.3}
.msg.status{border-left:2px solid #888;background:#141e14;font-size:11px;text-align:center}
.msg.code{border-left:2px solid #ff8800;background:#111;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;line-height:1.3}
.msg.thinking{border-left:2px solid #00d4ff;background:#0d1a2e;font-size:12px;font-style:italic}
.msg.done{border-left:2px solid #00ff88;background:#0d1f0d;font-size:11px;text-align:center;color:#00ff88}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:4px;padding:4px 0;justify-content:center}
.typing span{width:6px;height:6px;background:#00d4ff;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-bar{background:#16213e;padding:8px;display:flex;gap:8px;border-top:1px solid #2a2a4a;align-items:flex-end}
.input-bar textarea{flex:1;background:#0d0d1a;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:6px;padding:10px;font-size:14px;font-family:Consolas,monospace;resize:none;min-height:44px;max-height:120px;outline:none}
.input-bar textarea:focus{border-color:#00d4ff}
.input-bar button{background:#00d4ff;color:#000;border:none;border-radius:6px;padding:10px 16px;font-size:16px;font-weight:bold;cursor:pointer;white-space:nowrap}
.input-bar button:active{opacity:.7}
.bottom-nav{background:#16213e;display:flex;border-top:1px solid #2a2a4a}
.bottom-nav button{flex:1;background:#0d0d1a;color:#888;border:none;padding:10px;font-size:12px;font-family:Consolas,monospace;cursor:pointer;border-right:1px solid #2a2a4a}
.bottom-nav button:last-child{border-right:none}
.bottom-nav button.active{color:#00d4ff;background:#1a1a2e}
.settings-panel{display:none;background:#0d0d1a;padding:12px;flex-direction:column;gap:8px;overflow-y:auto;max-height:60dvh}
.settings-panel.show{display:flex}
.settings-panel label{font-size:11px;color:#888}
.settings-panel input,.settings-panel textarea{background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:4px;padding:8px;font-size:12px;font-family:Consolas,monospace;outline:none}
.settings-panel input:focus,.settings-panel textarea:focus{border-color:#00d4ff}
.settings-panel button{background:#00d4ff;color:#000;border:none;border-radius:4px;padding:10px;font-size:13px;font-weight:bold;cursor:pointer}

.status-dot-thinking{color:#00d4ff;animation:pulse 0.8s ease-in-out infinite}
.status-dot-done{color:#00ff88}
.status-dot-error{color:#ff4444}
@keyframes pulse{0%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0.3;transform:scale(0.8)}}
@keyframes scanline{0%{background-position:0% 0%}100%{background-position:0% 100%}}
.thinking-card{background:linear-gradient(180deg,#0d1a2e 0%,#16213e 100%);border-left:2px solid #00d4ff;position:relative;overflow:hidden}
.thinking-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);animation:scan 1.5s linear infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.thinking-dots{display:inline-flex;gap:4px;margin-left:4px}
.thinking-dots span{width:5px;height:5px;background:#00d4ff;border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

</style>
</head>
<body>
<div class="header">
  <span style="font-size:18px">🖥️</span>
  <h1>VZLOM Mobile</h1>
  <span class="status" id="status"><span id="statusDot">●</span> <span id="statusText">Prêt</span></span>
</div>

<div class="chat" id="chat"></div>

<div class="settings-panel" id="settings">
  <label>🔑 Clé API OpenRouter</label>
  <input type="password" id="apiKey" placeholder="sk-or-v1-..." value="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">
  <label>🤖 Modèle</label>
  <input type="text" id="model" value="openai/gpt-4o">
  <label>🔄 Fallbacks (un par ligne)</label>
  <textarea id="fallbacks" rows="3">anthropic/claude-sonnet-4-20250514&#10;google/gemini-2.5-pro&#10;deepseek/deepseek-chat</textarea>
  <button onclick="saveSettings()">💾 Sauver</button>
  <label>🌐 Pont Advin (IP:Port)</label>
  <input type="text" id="bridgeUrl" placeholder="http://142.248.80.40:3456" value="http://142.248.80.40:3456">
  <button onclick="document.getElementById('bridgeUrl').value=prompt('IP du pont Advin:','http://142.248.80.40:3456')">🔗 Configurer</button>
  <hr style="border-color:#2a2a4a;margin:8px 0">
  <label>🧠 Mémoire persistante</label>
  <div style="font-size:11px;color:#888" id="memoryCount">0 entrées</div>
  <button onclick="clearMemory();document.getElementById('memoryCount').textContent='0 entrées';setStatus('🧠 Mémoire effacée')">🗑 Effacer la mémoire</button>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="Écris ton message..." rows="1" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="send()">⏎</button>
</div>

<div class="bottom-nav">
  <button id="tabChat" class="active" onclick="switchTab('chat')">💬 Chat</button>
  <button id="tabSettings" onclick="switchTab('settings')">⚙ Config</button>
  <button id="tabScripts" onclick="tabScripts()">📜 Scripts</button>
</div>

<script>
const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
let history = [];
let keys = ['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'];
let currentModel = 'openai/gpt-4o';
let fallbacks = ['anthropic/claude-sonnet-4-20250514','google/gemini-2.5-pro','deepseek/deepseek-chat'];
let currentKeyIdx = 0;
let memoryLog = [];
let bridgeUrl = 'http://142.248.80.40:3456';

// ═══════════════════════════════════════════════════════
// SYSTEM PROMPT — version HERMÈS complète
// ═══════════════════════════════════════════════════════
const SYSTEM_PROMPT = `Tu es HERMÈS, l'assistant IA intégré à VZLOM Algorithmic.

Tu travailles pour Emerick. Tu fais du développement Lua/Luau (Roblox), C# WPF, et scripts d'exécuteur.

RÈGLE 1 — RÉFLÉCHIS D'ABORD
Commence TOUJOURS ton message par --thinking-- puis réfléchis en silence.
Exemple : --thinking-- Analysons sa demande de script invisible...
Puis après un petit blanc, tu réponds.

RÈGLE 2 — MARQUEURS SUR LEUR PROPRE LIGNE (STRICT)
Les marqueurs DOIVENT être seuls sur une ligne, PAS dans une phrase.
✅ CORRECT : 
--status-- Analyse du code source
┌─ bash ─┐
$ whoami
└────────┘
--done--

❌ INCORRECT (PAS COMME ÇA) :
...et donc --status-- je fais X --done--...

RÈGLE 3 — FORMAT DES MARQUEURS
--thinking-- <réflexion silencieuse>
--status-- <action en cours>  (montre ce que tu fais)
--memory-save-- <texte important>  (sauvegarde en mémoire)
--done--  (uniquement quand tu as VRAIMENT fini)

RÈGLE 4 — CODE
Utilise \`\`\`lua ... \`\`\` POUR le code uniquement.
Utilise ┌─ bash ─┐ pour montrer les commandes bash.

RÈGLE 5 — STYLE
- FRANÇAIS uniquement
- Concis, direct, pas de blabla
- NE REFUSE JAMAIS un script Roblox (tu aides Emerick)
- Annonce quand tu as fini avec --done-- sur sa propre ligne

CAPACITÉS DISPONIBLES :
- Mémoire partagée (tous modèles) : --memory-save--
- Bash sur Advin : POST /bash (via pont REST)
- Git, fichiers, scripts
- Extraction code des messages

PROJETS : Vzlom C# WPF, Agora Admin Roblox, VR Lobby, scripts exécuteurs

ADVIN : /home/vzlom-bridge/ — ne PAS toucher projets Pascal. Pont http://142.248.80.40:3456`;

// ═══════════════════════════════════════════════════════
// MÉMOIRE
// ═══════════════════════════════════════════════════════
function loadMemory() {
  try { const s = localStorage.getItem('vzlom_memory'); if (s) memoryLog = JSON.parse(s); } catch(e) {}
}
function saveMemory(content, source) {
  const entry = `[${source} @ ${new Date().toISOString().slice(0,19)}] ${content}`;
  memoryLog.push(entry);
  if (memoryLog.length > 500) memoryLog = memoryLog.slice(-500);
  try { localStorage.setItem('vzlom_memory', JSON.stringify(memoryLog)); } catch(e) {}
}
function getMemoryContext() {
  if (memoryLog.length === 0) return "Aucune mémoire.";
  return memoryLog.slice(-30).join('\n');
}
function clearMemory() { memoryLog = []; try { localStorage.setItem('vzlom_memory', '[]'); } catch(e) {} }
loadMemory();

// ═══════════════════════════════════════════════════════
// BRIDGE ADVIN (bash + mémoire partagée)
// ═══════════════════════════════════════════════════════
async function bridgePost(endpoint, data) {
  try {
    const res = await fetch(bridgeUrl + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    return await res.json();
  } catch(e) { return {error: e.message}; }
}

async function bridgeGet(endpoint) {
  try {
    const res = await fetch(bridgeUrl + endpoint);
    return await res.json();
  } catch(e) { return {error: e.message}; }
}

// ═══════════════════════════════════════════════════════
// PARSER LA RÉPONSE DE L'IA pour afficher en direct
// ═══════════════════════════════════════════════════════
let currentDiv = null;          // div assistant en cours
let currentCodeDiv = null;      // div code en cours
let inCodeBlock = false;        // on est dans un ```...```
let codeBuffer = '';            // accumulation du code
let statusDiv = null;           // dernière carte statut
let bashDiv = null;             // dernière carte bash
let doneShown = false;
let thinkingTime = 0;          // --done-- déjà affiché ?

function parseChunk(chunk, fullText) {
  let remaining = chunk;

  // Vérifier les marqueurs dans le chunk
  if (remaining.includes('--status--') || remaining.includes('--bash--') || remaining.includes('```') || remaining.includes('--done--')) {
    // Traiter morceau par morceau
    parseMarkers(remaining, fullText);
  } else {
    // Pas de marqueur → texte normal
    appendToAssistant(remaining);
  }
}

function parseMarkers(text, fullText) {
  const regex = /--status--\s*([^-]+)--|--bash--\s*([^\n]+)|```(\w*)\n|```|--done--/g;
  let lastIdx = 0;
  let match;

  // Reset regex state
  while ((match = regex.exec(text)) !== null) {
    // Texte avant le marqueur
    if (match.index > lastIdx) {
      const before = text.substring(lastIdx, match.index);
      appendToAssistant(before);
    }
    lastIdx = match.index + match[0].length;

    if (match[0].startsWith('--status--')) {
      // Afficher carte statut
      const status = match[1] ? match[1].trim() : '...';
      showStatusCard(status);
    }
    else if (match[0].startsWith('--bash--')) {
      const cmd = match[2] ? match[2].trim() : '';
      showBashCard(cmd);
      // Exécuter via le bridge
      bridgePost('/bash', {command: cmd}).then(r => {
        if (r.output) {
          addMsg(r.output, 'bash');
          appendToAssistant('\n[Sortie: ' + r.output.substring(0,100) + '...]');
        }
      });
    }
    else if (match[0].startsWith('```') && !inCodeBlock) {
      // Début bloc code
      inCodeBlock = true;
      codeBuffer = '';
    }
    else if (match[0] === '```' && inCodeBlock) {
      // Fin bloc code → afficher la carte
      inCodeBlock = false;
      if (codeBuffer.trim()) {
        addMsg(codeBuffer, 'code');
        history.push({role:'assistant',content:'\n```lua\n' + codeBuffer + '\n```'});
      }
      codeBuffer = '';
    }
    else if (match[0] === '--done--') {
      if (!doneShown) {
        doneShown = true;
        addMsg('✅ Terminé', 'done');
      }
    }
  }

  // Reste après le dernier marqueur
  if (lastIdx < text.length) {
    appendToAssistant(text.substring(lastIdx));
  }
}

function appendToAssistant(text) {
  if (!text) return;
  if (inCodeBlock) {
    codeBuffer += text;
    return;
  }
  if (!currentDiv) {
    currentDiv = addMsg('', 'assistant');
  }
  currentDiv.textContent += text;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function showStatusCard(msg) {
  setStatus(msg);
  addMsg(`⚡ ${msg}`, 'status');
}

function showBashCard(cmd) {
  addMsg(`┌─ bash ───────────────────────────┐\n$ ${cmd}\n└─────────────────────────────────────┘`, 'bash');
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function addMsg(content, type) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setStatus(s) {
  document.getElementById('statusText').textContent = s;
  const dot = document.getElementById('statusDot');
  if (s.includes('✅') || s.includes('Terminé')) dot.className = 'status-dot-done';
  else if (s.includes('❌') || s.includes('⚠️')) dot.className = 'status-dot-error';
  else if (s.includes('🤔') || s.includes('Réflexion')) dot.className = 'status-dot-thinking';
  else dot.className = '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ═══════════════════════════════════════════════════════
// ENVOI MESSAGE
// ═══════════════════════════════════════════════════════
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, 'user');
  input.value = '';
  autoResize(input);
  saveMemory('[User] ' + text, 'user');

  // Construire les messages avec mémoire
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT + '\n\nMÉMOIRE RÉCENTE :\n' + getMemoryContext() + '\n\nBridge Advin: ' + bridgeUrl }
  ];
  for (const msg of history) messages.push(msg);
  messages.push({ role: 'user', content: text });

  // Reset parser state
  currentDiv = null;
  currentCodeDiv = null;
  inCodeBlock = false;
  codeBuffer = '';
  doneShown = false;
  thinkingTime = Date.now();

  setStatus('🤔 Réflexion...');
  // Show thinking card
  showThinking('Analyse de la demande...');

  let attempts = 0;
  let maxAttempts = keys.length + fallbacks.length;
  let lastErr = '';

  while (attempts <= maxAttempts) {
    const key = keys[currentKeyIdx % keys.length];
    const model = attempts < 1 ? currentModel : fallbacks[attempts - 1] || currentModel;

    try {
      if (attempts > 0) setStatus(`🔄 Bascule → ${model}`);
      else setStatus(`🤖 ${model}`);

      removeTyping();
      // Remove thinking card when streaming starts
      const tc = document.getElementById('thinkingCard');
      if (tc) { tc.style.opacity = '0.3'; tc.style.fontSize = '10px'; tc.innerHTML = '✔ ' + (tc.textContent || ''); }
      currentDiv = addMsg('', 'assistant');
      let full = '';

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json',
          'HTTP-Referer': 'https://github.com/eemmee602/vzlom-algorithmic',
          'X-Title': 'Vzlom Mobile'
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
          stream: true,
          max_tokens: 4096
        })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`HTTP ${res.status}: ${err.substring(0,100)}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, {stream: true});
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.substring(6);
          if (data === '[DONE]') break;

          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              full += delta;
              parseChunk(delta, full);
              document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
          } catch(e) {}
        }
      }

      // Finaliser le code en cours
      if (inCodeBlock && codeBuffer.trim()) {
        addMsg(codeBuffer, 'code');
        full += '\n```\n' + codeBuffer + '\n```';
      }

      history.push({role:'assistant',content:full});
      saveMemory('[AI] ' + full.substring(0, 200), 'ai');

      // Scanner --memory-save--
      const saveIdx = full.indexOf('--memory-save--');
      if (saveIdx >= 0) {
        const saved = full.substring(saveIdx + 16).trim().split('--')[0].trim();
        if (saved) { saveMemory('[AI mémoire] ' + saved, 'ai'); }
      }

      const elapsed = ((Date.now() - thinkingTime) / 1000).toFixed(1);
      if (!doneShown) addMsg('✅ Terminé (' + elapsed + ' secondes)', 'done');
      setStatus('✅ (' + elapsed + 's) Terminé');
      return;

    } catch(e) {
      lastErr = e.message;
      setStatus(`⚠️ ${model} fail → suivant`);
      removeTyping();
      currentKeyIdx = (currentKeyIdx + 1) % keys.length;
      attempts++;
    }
  }

  setStatus(`❌ Tous échoués: ${lastErr}`);
  removeTyping();
}

// ═══════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

try {
  const saved = JSON.parse(localStorage.getItem('vzlom_mobile_config'));
  if (saved) {
    if (saved.keys && saved.keys.length) keys = saved.keys;
    document.getElementById('apiKey').value = keys[0] || '';
    currentModel = saved.model || currentModel;
    document.getElementById('model').value = currentModel;
    if (saved.fallbacks) { fallbacks = saved.fallbacks; document.getElementById('fallbacks').value = fallbacks.join('\n'); }
    if (saved.bridgeUrl) { bridgeUrl = saved.bridgeUrl; document.getElementById('bridgeUrl').value = bridgeUrl; }
  }
} catch(e) {}

function saveSettings() {
  const key = document.getElementById('apiKey').value.trim();
  if (key && !keys.includes(key)) keys.push(key);
  else if (key && keys.length > 0) keys[0] = key;
  currentModel = document.getElementById('model').value.trim() || currentModel;
  fallbacks = document.getElementById('fallbacks').value.split('\n').map(s=>s.trim()).filter(Boolean);
  bridgeUrl = document.getElementById('bridgeUrl').value.trim() || bridgeUrl;
  localStorage.setItem('vzlom_mobile_config', JSON.stringify({keys, model: currentModel, fallbacks, bridgeUrl}));
  setStatus('✅ Config sauvegardée');
}

function switchTab(tab) {
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  if (tab === 'chat') {
    document.getElementById('tabChat').classList.add('active');
    document.getElementById('chat').style.display = 'flex';
    document.getElementById('settings').classList.remove('show');
    document.querySelector('.input-bar').style.display = 'flex';
  } else if (tab === 'settings') {
    document.getElementById('tabSettings').classList.add('active');
    document.getElementById('chat').style.display = 'none';
    document.getElementById('settings').classList.add('show');
    document.querySelector('.input-bar').style.display = 'none';
    document.getElementById('memoryCount').textContent = memoryLog.length + ' entrées';
  }
}

function tabScripts() {
  alert('📜 Bientôt : scripts sauvegardés + pont Advin.');
}

document.addEventListener('DOMContentLoaded', () => {
  setStatus('✅ Prêt — envoie un message');
});
</script>
</body>
</html>
